name: backend-ci

on:
  push:
    paths:
      - 'custom_backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'custom_backend/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: custom_backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: uare
          POSTGRES_USER: uare
          POSTGRES_PASSWORD: uare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uare -d uare"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: custom_backend/package-lock.json
      - run: npm ci
      - run: node scripts/runMigrations.mjs
        env:
          DATABASE_URL: postgres://uare:uare@127.0.0.1:5432/uare
      - run: npm test
        env:
          NODE_ENV: test
          CUSTOM_BACKEND_MODE: postgres
          DATABASE_URL: postgres://uare:uare@127.0.0.1:5432/uare
          REDIS_URL: redis://127.0.0.1:6379
          RATE_LIMIT_MODE: redis
          EVENT_BUS_MODE: redis
          EVENT_BUS_REDIS_URL: redis://127.0.0.1:6379
          EVENT_REPLAY_STORE_MODE: postgres
          WORKER_STORE_MODE: postgres
          JOB_STORE_MODE: postgres
          ALLOW_DEV_HEADER_AUTH: "false"
