version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: uare
      POSTGRES_USER: uare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-now}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uare -d uare"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - custom_backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 8787
      CUSTOM_BACKEND_MODE: postgres
      DATABASE_URL: postgres://uare:${POSTGRES_PASSWORD:-change-me-now}@postgres:5432/uare
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_MODE: redis
      EVENT_BUS_MODE: redis
      EVENT_BUS_REDIS_URL: redis://redis:6379
      EVENT_REPLAY_STORE_MODE: postgres
      WORKER_STORE_MODE: postgres
      JOB_STORE_MODE: postgres
      ALLOW_DEV_HEADER_AUTH: "false"
      TRUST_PROXY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - custom_backend/.env.production
    environment:
      NODE_ENV: production
      CUSTOM_BACKEND_MODE: postgres
      DATABASE_URL: postgres://uare:${POSTGRES_PASSWORD:-change-me-now}@postgres:5432/uare
      REDIS_URL: redis://redis:6379
      EVENT_BUS_MODE: redis
      EVENT_BUS_REDIS_URL: redis://redis:6379
      EVENT_REPLAY_STORE_MODE: postgres
      WORKER_STORE_MODE: postgres
      JOB_STORE_MODE: postgres
      AUTONOMOUS_WORKER_ENABLED: "true"
      ALLOW_DEV_HEADER_AUTH: "false"
    command: ["bash", "-lc", "node scripts/runMigrations.mjs && node worker.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_artifacts:/app/artifacts

volumes:
  postgres_data:
  redis_data:
  app_data:
  app_artifacts:
